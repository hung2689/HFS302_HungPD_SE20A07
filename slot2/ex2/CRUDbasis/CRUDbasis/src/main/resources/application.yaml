server:
  port: 8080
  servlet:
    context-path: /learning

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/learning
    username: root
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: UTC